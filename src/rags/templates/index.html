<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rags to Riches — GitHub Stars</title>
<style>
  /* Catppuccin Mocha */
  :root {
    --bg:      #1e1e2e;
    --surface: #181825;
    --overlay: #313244;
    --text:    #cdd6f4;
    --subtext: #6c7086;
    --accent:  #89b4fa;
    --green:   #a6e3a1;
    --yellow:  #f9e2af;
    --red:     #f38ba8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--bg);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  label {
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  input[type="search"], select {
    background: var(--overlay);
    color: var(--text);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }

  input[type="search"] { width: 240px; }
  input[type="search"]::placeholder { color: var(--subtext); }

  select { cursor: pointer; }
  select option { background: var(--overlay); }

  #toolbar-spacer { flex: 1; }

  button {
    background: var(--overlay);
    color: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, color 0.15s;
  }
  button:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
  button:disabled { opacity: 0.4; cursor: default; }

  /* ── Table ── */
  #table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  colgroup col:nth-child(1) { width: 200px; }
  colgroup col:nth-child(2) { width: auto;  }
  colgroup col:nth-child(3) { width: 110px; }
  colgroup col:nth-child(4) { width: 70px;  }
  colgroup col:nth-child(5) { width: 260px; }

  thead th {
    background: var(--overlay);
    color: var(--accent);
    font-weight: 700;
    text-align: left;
    padding: 8px 10px;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: " ↑"; }
  thead th.sort-desc::after { content: " ↓"; }

  th:nth-child(4) { text-align: right; }

  tbody tr {
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:nth-child(odd)  { background: var(--surface); }
  tbody tr:nth-child(even) { background: var(--bg); }
  tbody tr:hover { background: var(--overlay); }

  td {
    padding: 7px 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 0;
  }

  td:nth-child(1) { color: var(--accent); font-weight: 500; }
  td:nth-child(3) { color: var(--green); }
  td:nth-child(4) { color: var(--yellow); text-align: right; }
  td:nth-child(5) { color: var(--subtext); }

  /* ── Status bar ── */
  #statusbar {
    background: #11111b;
    color: var(--subtext);
    font-size: 11px;
    padding: 4px 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #progress-bar {
    height: 2px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    flex-shrink: 0;
  }

  /* ── Empty state ── */
  #empty {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--subtext);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--overlay); border-radius: 4px; }
</style>
</head>
<body>

<div id="toolbar">
  <label for="search">Search:</label>
  <input id="search" type="search" placeholder="name, description, topic, language…" autofocus>

  <label for="lang">Language:</label>
  <select id="lang"><option value="">All</option></select>

  <label for="sort">Sort:</label>
  <select id="sort">
    <option value="stars">Stars</option>
    <option value="name">Name</option>
    <option value="updated">Updated</option>
  </select>

  <div id="toolbar-spacer"></div>

  <button id="refresh-btn">⟳ Refresh</button>
</div>

<div id="table-wrap">
  <table>
    <colgroup>
      <col><col><col><col><col>
    </colgroup>
    <thead>
      <tr>
        <th data-col="full_name">Repository</th>
        <th data-col="description">Description</th>
        <th data-col="language">Language</th>
        <th data-col="stargazers_count" class="sort-desc">Stars</th>
        <th>URL</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty">No results.</div>
</div>

<div id="statusbar">
  <span id="status-text">Loading…</span>
  <div style="flex:1"></div>
  <span id="count-text"></span>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let allRepos = [];
  let sortCol  = "stargazers_count";
  let sortAsc  = false;

  const searchEl  = document.getElementById("search");
  const langEl    = document.getElementById("lang");
  const sortEl    = document.getElementById("sort");
  const tbody     = document.getElementById("tbody");
  const empty     = document.getElementById("empty");
  const statusEl  = document.getElementById("status-text");
  const countEl   = document.getElementById("count-text");
  const refreshBtn = document.getElementById("refresh-btn");

  // ── Boot ─────────────────────────────────────────────────────────────────
  async function boot() {
    const res = await fetch("/api/repos");
    const { repos, cached_at, count } = await res.json();

    if (!repos.length) {
      statusEl.textContent = "No cached data — click Refresh to fetch from GitHub.";
      return;
    }

    setRepos(repos);
    const age = cached_at
      ? new Date(cached_at * 1000).toLocaleTimeString()
      : "unknown";
    statusEl.textContent = `Loaded ${count} repos from cache (fetched at ${age})`;
  }

  // ── Set repos & rebuild filters ──────────────────────────────────────────
  function setRepos(repos) {
    allRepos = repos;

    // Rebuild language dropdown
    const current = langEl.value;
    const langs = [...new Set(repos.map(r => r.language).filter(Boolean))].sort();
    langEl.innerHTML = '<option value="">All</option>' +
      langs.map(l => `<option value="${l}"${l===current?' selected':''}>${l}</option>`).join("");

    render();
  }

  // ── Scoring (mirrors search.py) ──────────────────────────────────────────
  function score(repo, q) {
    if (!q) return 1;
    const name  = (repo.name || "").toLowerCase();
    const full  = (repo.full_name || "").toLowerCase();
    const desc  = (repo.description || "").toLowerCase();
    const topics = (repo.topics || []).join(" ").toLowerCase();
    const lang  = (repo.language || "").toLowerCase();
    if (q === name)            return 100;
    if (name.startsWith(q))   return 80;
    if (name.includes(q))     return 60;
    if (full.includes(q))     return 50;
    if (topics.includes(q))   return 40;
    if (desc.includes(q))     return 30;
    if (lang.includes(q))     return 20;
    return 0;
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function render() {
    const q    = searchEl.value.trim().toLowerCase();
    const lang = langEl.value;
    const sort = sortEl.value;

    let repos = allRepos;

    // filter
    if (q)    repos = repos.filter(r => score(r, q) > 0).sort((a,b) => score(b,q) - score(a,q));
    if (lang) repos = repos.filter(r => r.language === lang);

    // sort (only when no query — query result order is already by score)
    if (!q) {
      repos = [...repos].sort((a, b) => {
        let va, vb;
        if (sort === "stars")   { va = a.stargazers_count || 0; vb = b.stargazers_count || 0; }
        else if (sort === "name")    { va = a.full_name.toLowerCase(); vb = b.full_name.toLowerCase(); }
        else                    { va = a.updated_at || ""; vb = b.updated_at || ""; }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ?  1 : -1;
        return 0;
      });
    }

    // render rows
    if (!repos.length) {
      tbody.innerHTML = "";
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      tbody.innerHTML = repos.map(r => `
        <tr data-url="${r.html_url}">
          <td title="${r.full_name}">${r.full_name}</td>
          <td title="${r.description||''}">${r.description||''}</td>
          <td>${r.language||''}</td>
          <td>${(r.stargazers_count||0).toLocaleString()}</td>
          <td title="${r.html_url}">${r.html_url}</td>
        </tr>`).join("");
    }

    const shown = repos.length;
    const total = allRepos.length;
    countEl.textContent = shown !== total
      ? `showing ${shown.toLocaleString()} of ${total.toLocaleString()}`
      : `${total.toLocaleString()} repos`;
  }

  // ── Column header sort ───────────────────────────────────────────────────
  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = col === "full_name"; }

      document.querySelectorAll("thead th").forEach(t => t.classList.remove("sort-asc","sort-desc"));
      th.classList.add(sortAsc ? "sort-asc" : "sort-desc");

      // map col to sort select
      if (col === "stargazers_count") sortEl.value = "stars";
      else if (col === "full_name")   sortEl.value = "name";
      else if (col === "updated_at")  sortEl.value = "updated";
      render();
    });
  });

  // ── Row click → open URL ─────────────────────────────────────────────────
  tbody.addEventListener("click", e => {
    const row = e.target.closest("tr");
    if (row) window.open(row.dataset.url, "_blank");
  });

  // ── Live filters ─────────────────────────────────────────────────────────
  searchEl.addEventListener("input", render);
  langEl.addEventListener("change", render);
  sortEl.addEventListener("change", render);

  // ── Refresh via SSE ──────────────────────────────────────────────────────
  refreshBtn.addEventListener("click", () => {
    refreshBtn.disabled = true;
    statusEl.textContent = "Connecting…";
    countEl.textContent = "";

    const es = new EventSource("/api/refresh");

    es.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === "progress") {
        statusEl.textContent = `Fetching… ${msg.total.toLocaleString()} repos so far (page ${msg.page})`;
      } else if (msg.type === "done") {
        const age = new Date(msg.cached_at * 1000).toLocaleTimeString();
        statusEl.textContent = `Fetched ${msg.count.toLocaleString()} repos from GitHub (at ${age})`;
        es.close();
        refreshBtn.disabled = false;
        // reload repos from cache
        fetch("/api/repos").then(r => r.json()).then(d => setRepos(d.repos));
      } else if (msg.type === "error") {
        statusEl.textContent = `Error: ${msg.message}`;
        es.close();
        refreshBtn.disabled = false;
      }
    };

    es.onerror = () => {
      statusEl.textContent = "Connection error during refresh.";
      es.close();
      refreshBtn.disabled = false;
    };
  });

  // ── Go ───────────────────────────────────────────────────────────────────
  boot();
</script>
</body>
</html>
